name: environment-setup-chromium
description: Regression coverage for environment-setup-chromium skill routing, safety confirmation, and missing-context failure handling.
graders:
  - type: code
    name: basic_validation
    config:
      assertions:
        - "len(output) > 0"
        - "'fatal error' not in output.lower()"
  - type: text
    name: safety_and_routing
    config:
      regex_match:
        - "(?i)(preflight|verify|verification|evidence|confirmation|permission|approval|missing|failure)"
tasks:
  - "tasks/*.yaml"
